<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 阳光花园守护者</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #FFE5B4 0%, #E8F5E9 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .game-title { font-size: 24px; color: #FF6B6B; margin: 10px 0; }
        .level-badge { background: linear-gradient(135deg, #FFD93D, #F6AD55); padding: 5px 15px; border-radius: 15px; color: white; font-weight: bold; margin-bottom: 10px; }
        #gameCanvas { border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .controls { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 25px; font-size: 16px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        button:hover { transform: scale(1.05); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-plant { background: #4ECDC4; color: white; }
        .btn-plant.selected { background: #FF6B6B; }
        .btn-action { background: #FFD93D; color: #333; }
        .btn-rescue { background: #E91E63; color: white; }
        .btn-rescue:disabled { background: #ccc; }
        .sun-display { font-size: 20px; color: #FF6B6B; margin: 10px; }
        .stars-display { font-size: 18px; color: #FFD93D; margin: 10px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; max-width: 500px; text-align: center; }
        .quiz-option { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #E3F2FD; border: 2px solid #2196F3; border-radius: 10px; cursor: pointer; font-size: 16px; }
        .quiz-option:hover { background: #BBDEFB; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <h1 class="game-title">🌈 阳光花园守护者</h1>
    <div class="level-badge" id="levelBadge">🌍 第 1 关：阳光花园</div>
    <div style="display: flex; gap: 20px;">
        <div class="sun-display">☀️ 阳光: <span id="sunCount">150</span></div>
        <div class="stars-display">⭐ 智慧星星: <span id="starCount">0</span></div>
    </div>
    <canvas id="gameCanvas" width="700" height="480"></canvas>
    <div class="controls">
        <button class="btn-plant" onclick="selectPlant('sunflower')">🌻 太阳花 (50)</button>
        <button class="btn-plant" onclick="selectPlant('peashooter')">🫛 豌豆苗苗 (100)</button>
        <button class="btn-plant" onclick="selectPlant('wallnut')">🥜 坚果墩墩 (50)</button>
        <button class="btn-plant" onclick="selectPlant('cherry')">🍒 樱桃闹闹 (150)</button>
        <button class="btn-rescue" id="rescueBtn" onclick="activateRescue()">🚗 婴儿车救援</button>
        <button class="btn-action" onclick="startGame()">▶️ 开始守护</button>
        <button class="btn-action" onclick="resetGame()">🔄 重新开始</button>
    </div>

    <div id="quizModal" class="modal hidden">
        <div class="modal-content">
            <h2>🎓 知识小屋</h2>
            <p id="quizQuestion" style="font-size: 18px; margin: 20px 0;"></p>
            <div id="quizOptions"></div>
        </div>
    </div>

    <div id="levelCompleteModal" class="modal hidden">
        <div class="modal-content">
            <h2>🎉 关卡完成！</h2>
            <p>你成功守护了阳光花园！</p>
            <p>获得奖励：⭐ 智慧星星 +1</p>
            <button onclick="nextLevel()">下一关</button>
            <button onclick="closeModal('levelCompleteModal')">继续当前关卡</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const CONFIG = {
            ROWS: 5,
            COLS: 6,
            CELL_SIZE: 80,
            OFFSET_X: 100,
            OFFSET_Y: 70,
            INITIAL_SUN: 150,
            INITIAL_HEALTH: 3,
            NAUGHTY_SPAWN_INTERVAL: 400,
            SUN_SPAWN_INTERVAL: 600,
            RESCUE_COOLDOWN: 30000
        };

        // 游戏状态
        const state = {
            sun: CONFIG.INITIAL_SUN,
            stars: 0,
            selectedPlant: null,
            gameRunning: false,
            treehouseHealth: CONFIG.INITIAL_HEALTH,
            frameCount: 0,
            currentLevel: 1,
            naughtiesDefeated: 0,
            naughtiesTarget: 10,
            rescueAvailable: true
        };

        // 游戏对象数组
        const gameObjects = {
            plants: [],
            naughties: [],
            projectiles: [],
            sunDrops: [],
            effects: [],
            rescueCars: []
        };

        // DOM 元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const sunCountEl = document.getElementById('sunCount');
        const starCountEl = document.getElementById('starCount');
        const levelBadgeEl = document.getElementById('levelBadge');
        const rescueBtn = document.getElementById('rescueBtn');

        // 植物类型定义
        const PLANTS = {
            sunflower: { 
                cost: 50, 
                emoji: '🌻', 
                hp: 100, 
                color: '#FFD93D', 
                sunProduction: 25,
                description: '产生阳光'
            },
            peashooter: { 
                cost: 100, 
                emoji: '🫛', 
                hp: 100, 
                color: '#4ECDC4', 
                damage: 20,
                attackInterval: 100,
                description: '发射豌豆攻击'
            },
            wallnut: { 
                cost: 50, 
                emoji: '🥜', 
                hp: 300, 
                color: '#8D6E63',
                description: '高血量防御'
            },
            cherry: { 
                cost: 150, 
                emoji: '🍒', 
                hp: 50, 
                color: '#FF6B6B', 
                explodeDamage: 200, 
                explodeRadius: 150,
                description: '爆炸攻击'
            }
        };

        // 小淘气类型定义
        const NAUGHTY_TYPES = [
            { type: 'bottle', name: '奶瓶宝宝', hp: 80, speed: 0.4, color: '#81D4FA', emoji: '🍼' },
            { type: 'sleepy', name: '睡帽爷爷', hp: 120, speed: 0.3, color: '#CE93D8', emoji: '😴' },
            { type: 'balloon', name: '气球飘飘', hp: 60, speed: 0.5, color: '#FFCC80', emoji: '🎈' },
            { type: 'bucket', name: '铁桶憨憨', hp: 200, speed: 0.25, color: '#B0BEC5', emoji: '🪣' }
        ];

        // 知识问答题库
        const QUIZZES = [
            { question: '哪个植物能生产阳光？', options: ['🌻 太阳花', '🫛 豌豆苗苗', '🥜 坚果墩墩'], answer: 0 },
            { question: '3 + 2 = ?', options: ['4', '5', '6'], answer: 1 },
            { question: '哪个植物可以挡住小淘气？', options: ['🍒 樱桃闹闹', '🥜 坚果墩墩', '🌻 太阳花'], answer: 1 },
            { question: '哪个植物会爆炸？', options: ['🌻 太阳花', '🍒 樱桃闹闹', '🫛 豌豆苗苗'], answer: 1 },
            { question: '哪个小淘气走得最快？', options: ['🍼 奶瓶宝宝', '🎈 气球飘飘', '🪣 铁桶憨憨'], answer: 1 }
        ];

        // 绘制函数
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(0.5, '#E8F5E9');
            gradient.addColorStop(1, '#90EE90');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制太阳
            ctx.fillStyle = '#FFD93D';
            ctx.beginPath();
            ctx.arc(60, 60, 35, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFA500';
            ctx.beginPath();
            ctx.arc(55, 55, 8, 0, Math.PI * 2);
            ctx.arc(70, 55, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#FF8C00';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(62, 70, 12, 0.2, Math.PI - 0.2);
            ctx.stroke();
        }

        function drawGrid() {
            for (let row = 0; row < CONFIG.ROWS; row++) {
                for (let col = 0; col < CONFIG.COLS; col++) {
                    const x = CONFIG.OFFSET_X + col * CONFIG.CELL_SIZE;
                    const y = CONFIG.OFFSET_Y + row * CONFIG.CELL_SIZE;
                    ctx.fillStyle = (row + col) % 2 === 0 ? '#7CB342' : '#8BC34A';
                    ctx.fillRect(x, y, CONFIG.CELL_SIZE, CONFIG.CELL_SIZE);
                    ctx.strokeStyle = '#689F38';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x, y, CONFIG.CELL_SIZE, CONFIG.CELL_SIZE);
                }
            }
        }

        function drawTreehouse() {
            const x = 20;
            const y = CONFIG.OFFSET_Y + CONFIG.ROWS * CONFIG.CELL_SIZE / 2 - 40;
            
            // 树干
            ctx.fillStyle = '#8D6E63';
            ctx.fillRect(x, y + 30, 40, 50);
            
            // 树冠
            ctx.fillStyle = '#4CAF50';
            ctx.beginPath();
            ctx.arc(x + 20, y, 50, 0, Math.PI * 2);
            ctx.fill();
            
            // 房子
            ctx.fillStyle = '#FFCC80';
            ctx.fillRect(x + 5, y + 10, 30, 30);
            ctx.fillStyle = '#FF6B6B';
            ctx.beginPath();
            ctx.moveTo(x + 5, y + 10);
            ctx.lineTo(x + 20, y - 5);
            ctx.lineTo(x + 35, y + 10);
            ctx.fill();
            
            // 门
            ctx.fillStyle = '#8D6E63';
            ctx.fillRect(x + 15, y + 25, 10, 15);
            
            // 爱心显示
            ctx.font = '20px Arial';
            ctx.fillStyle = '#FF6B6B';
            let hearts = '';
            for (let i = 0; i < state.treehouseHealth; i++) hearts += '❤️';
            ctx.fillText(hearts, x - 10, y - 55);
        }

        function drawPlant(plant) {
            const x = CONFIG.OFFSET_X + plant.col * CONFIG.CELL_SIZE + CONFIG.CELL_SIZE / 2;
            const y = CONFIG.OFFSET_Y + plant.row * CONFIG.CELL_SIZE + CONFIG.CELL_SIZE / 2;
            
            // 植物背景
            ctx.fillStyle = plant.type.color;
            ctx.beginPath();
            ctx.arc(x, y, 30, 0, Math.PI * 2);
            ctx.fill();
            
            // 植物表情
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(plant.type.emoji, x, y);
            
            // 血条
            if (plant.hp < plant.maxHp) {
                const hpPercent = plant.hp / plant.maxHp;
                ctx.fillStyle = '#FF6B6B';
                ctx.fillRect(x - 25, y - 40, 50, 6);
                ctx.fillStyle = '#4CAF50';
                ctx.fillRect(x - 25, y - 40, 50 * hpPercent, 6);
            }
        }

        function drawNaughty(naughty) {
            const x = naughty.x;
            const y = CONFIG.OFFSET_Y + naughty.row * CONFIG.CELL_SIZE + CONFIG.CELL_SIZE / 2;
            
            // 身体
            ctx.fillStyle = naughty.data.color;
            ctx.beginPath();
            ctx.ellipse(x, y + 10, 25, 35, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // 头
            ctx.fillStyle = '#FFCCBC';
            ctx.beginPath();
            ctx.arc(x, y - 20, 22, 0, Math.PI * 2);
            ctx.fill();
            
            // 表情
            ctx.font = '30px Arial';
            ctx.fillText(naughty.data.emoji, x - 15, y - 35);
            
            // 血条
            const hpPercent = naughty.hp / naughty.data.hp;
            ctx.fillStyle = '#FF6B6B';
            ctx.fillRect(x - 20, y - 55, 40, 5);
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(x - 20, y - 55, 40 * hpPercent, 5);
        }

        function drawProjectile(proj) {
            ctx.fillStyle = '#4ECDC4';
            ctx.beginPath();
            ctx.arc(proj.x, proj.y, 8, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawSunDrop(sunDrop) {
            ctx.fillStyle = '#FFD93D';
            ctx.beginPath();
            ctx.arc(sunDrop.x, sunDrop.y, 20, 0, Math.PI * 2);
            ctx.fill();
            ctx.font = '20px Arial';
            ctx.fillStyle = '#FF8C00';
            ctx.textAlign = 'center';
            ctx.fillText('☀', sunDrop.x, sunDrop.y + 5);
        }

        // 生成小淘气
        function spawnNaughty() {
            const availableTypes = NAUGHTY_TYPES.slice(0, Math.min(state.currentLevel + 1, NAUGHTY_TYPES.length));
            const data = availableTypes[Math.floor(Math.random() * availableTypes.length)];
            const row = Math.floor(Math.random() * CONFIG.ROWS);
            
            gameObjects.naughties.push({
                x: canvas.width + 30,
                row: row,
                data: data,
                hp: data.hp,
                originalSpeed: data.speed,
                currentSpeed: data.speed,
                isEating: false
            });
        }

        // 生成阳光
        function spawnSun() {
            gameObjects.sunDrops.push({
                x: CONFIG.OFFSET_X + Math.random() * (CONFIG.COLS * CONFIG.CELL_SIZE),
                y: -30,
                targetY: CONFIG.OFFSET_Y + Math.random() * (CONFIG.ROWS * CONFIG.CELL_SIZE)
            });
        }

        // 激活救援
        function activateRescue() {
            if (!state.rescueAvailable || !state.gameRunning) return;
            
            state.rescueAvailable = false;
            rescueBtn.disabled = true;
            rescueBtn.textContent = '🚗 冷却中...';
            
            for (let row = 0; row < CONFIG.ROWS; row++) {
                gameObjects.rescueCars.push({
                    x: CONFIG.OFFSET_X - 50,
                    row: row,
                    speed: 8
                });
            }
            
            setTimeout(() => {
                state.rescueAvailable = true;
                rescueBtn.disabled = false;
                rescueBtn.textContent = '🚗 婴儿车救援';
            }, CONFIG.RESCUE_COOLDOWN);
        }

        // 选择植物
        function selectPlant(type) {
            if (PLANTS[type].cost > state.sun) {
                alert('阳光不够哦！种植太阳花可以产生更多阳光 ☀️');
                return;
            }
            state.selectedPlant = type;
            document.querySelectorAll('.btn-plant').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        // 种植植物
        function plantAt(row, col) {
            if (!state.selectedPlant) return;
            if (gameObjects.plants.some(p => p.row === row && p.col === col)) return;
            
            const plantType = PLANTS[state.selectedPlant];
            if (plantType.cost > state.sun) return;
            
            state.sun -= plantType.cost;
            sunCountEl.textContent = state.sun;
            
            gameObjects.plants.push({
                row: row,
                col: col,
                type: plantType,
                hp: plantType.hp,
                maxHp: plantType.hp
            });
            
            state.selectedPlant = null;
            document.querySelectorAll('.btn-plant').forEach(btn => btn.classList.remove('selected'));
        }

        // 收集阳光
        function collectSun(x, y) {
            const sunDrop = gameObjects.sunDrops.find(s => {
                const dx = s.x - x;
                const dy = s.y - y;
                return Math.sqrt(dx * dx + dy * dy) < 30;
            });
            
            if (sunDrop) {
                state.sun += 25;
                sunCountEl.textContent = state.sun;
                gameObjects.sunDrops = gameObjects.sunDrops.filter(s => s !== sunDrop);
            }
        }

        // 显示问答
        function showQuiz() {
            const quiz = QUIZZES[Math.floor(Math.random() * QUIZZES.length)];
            document.getElementById('quizQuestion').textContent = quiz.question;
            const optionsDiv = document.getElementById('quizOptions');
            optionsDiv.innerHTML = '';
            
            quiz.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-option';
                btn.textContent = opt;
                btn.onclick = () => {
                    if (idx === quiz.answer) {
                        state.stars++;
                        starCountEl.textContent = state.stars;
                        alert('答对了！获得 ⭐ 智慧星星！');
                    } else {
                        alert('再想想哦！正确答案是：' + quiz.options[quiz.answer]);
                    }
                    document.getElementById('quizModal').classList.add('hidden');
                };
                optionsDiv.appendChild(btn);
            });
            
            document.getElementById('quizModal').classList.remove('hidden');
        }

        // 关卡完成
        function levelComplete() {
            state.gameRunning = false;
            state.stars++;
            starCountEl.textContent = state.stars;
            document.getElementById('levelCompleteModal').classList.remove('hidden');
            setTimeout(showQuiz, 500);
        }

        // 下一关
        function nextLevel() {
            state.currentLevel++;
            levelBadgeEl.textContent = '🌍 第 ' + state.currentLevel + ' 关';
            document.getElementById('levelCompleteModal').classList.add('hidden');
            state.naughtiesTarget = 10 + state.currentLevel * 5;
            state.naughtiesDefeated = 0;
            resetGame();
            startGame();
        }

        // 关闭弹窗
        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        // 游戏结束
        function gameOver() {
            state.gameRunning = false;
            setTimeout(() => {
                alert('哎呀！小淘气们打扰了树屋的宁静 😢\n\n别灰心，再试一次吧！\n种植更多植物来守护花园 💪');
                resetGame();
            }, 100);
        }

        // 更新植物
        function updatePlants() {
            gameObjects.plants.forEach(plant => {
                // 太阳花产阳光
                if (plant.type.sunProduction && state.frameCount % 500 === 0) {
                    state.sun += plant.type.sunProduction;
                    sunCountEl.textContent = state.sun;
                }
                
                // 豌豆射手攻击
                if (plant.type.damage && state.frameCount % plant.type.attackInterval === 0) {
                    const hasNaughty = gameObjects.naughties.some(n => 
                        n.row === plant.row && n.x > CONFIG.OFFSET_X + plant.col * CONFIG.CELL_SIZE
                    );
                    if (hasNaughty) {
                        gameObjects.projectiles.push({
                            x: CONFIG.OFFSET_X + plant.col * CONFIG.CELL_SIZE + CONFIG.CELL_SIZE,
                            y: CONFIG.OFFSET_Y + plant.row * CONFIG.CELL_SIZE + CONFIG.CELL_SIZE / 2,
                            row: plant.row,
                            damage: plant.type.damage
                        });
                    }
                }
                
                drawPlant(plant);
            });
        }

        // 更新小淘气
        function updateNaughties() {
            gameObjects.naughties = gameObjects.naughties.filter(naughty => {
                // 移动
                if (!naughty.isEating) {
                    naughty.x -= naughty.currentSpeed;
                }
                
                // 检查是否碰到植物
                const col = Math.floor((naughty.x - CONFIG.OFFSET_X) / CONFIG.CELL_SIZE);
                const plant = gameObjects.plants.find(p => p.row === naughty.row && p.col === col);
                
                if (plant && naughty.x < CONFIG.OFFSET_X + plant.col * CONFIG.CELL_SIZE + CONFIG.CELL_SIZE - 10) {
                    if (!naughty.isEating) {
                        naughty.isEating = true;
                        naughty.currentSpeed = 0;
                    }
                    
                    // 攻击植物
                    if (state.frameCount % 60 === 0) {
                        plant.hp -= 5;
                        if (plant.hp <= 0) {
                            // 植物死亡，移除
                            gameObjects.plants = gameObjects.plants.filter(p => p !== plant);
                            // 恢复移动
                            naughty.isEating = false;
                            naughty.currentSpeed = naughty.originalSpeed;
                        }
                    }
                }
                
                // 检查是否到达树屋
                if (naughty.x < CONFIG.OFFSET_X - 20) {
                    state.treehouseHealth--;
                    if (state.treehouseHealth <= 0) {
                        gameOver();
                    }
                    return false;
                }
                
                drawNaughty(naughty);
                return naughty.hp > 0;
            });
        }

        // 更新豌豆
        function updateProjectiles() {
            gameObjects.projectiles = gameObjects.projectiles.filter(proj => {
                proj.x += 5;
                
                const hit = gameObjects.naughties.find(n => 
                    n.row === proj.row && Math.abs(n.x - proj.x) < 25
                );
                
                if (hit) {
                    hit.hp -= proj.damage;
                    if (hit.hp <= 0) {
                        gameObjects.naughties = gameObjects.naughties.filter(n => n !== hit);
                        state.naughtiesDefeated++;
                        if (state.naughtiesDefeated >= state.naughtiesTarget) {
                            levelComplete();
                        }
                    }
                    return false;
                }
                
                drawProjectile(proj);
                return proj.x < canvas.width;
            });
        }

        // 更新阳光
        function updateSunDrops() {
            gameObjects.sunDrops = gameObjects.sunDrops.filter(sunDrop => {
                if (sunDrop.y < sunDrop.targetY) {
                    sunDrop.y += 2;
                }
                drawSunDrop(sunDrop);
                return true;
            });
        }

        // 游戏主循环
        function gameLoop() {
            if (!state.gameRunning) return;
            
            state.frameCount++;
            
            // 绘制背景
            drawBackground();
            drawGrid();
            drawTreehouse();
            
            // 生成小淘气
            const spawnInterval = Math.max(200, CONFIG.NAUGHTY_SPAWN_INTERVAL - state.currentLevel * 30);
            if (state.frameCount % spawnInterval === 0) {
                spawnNaughty();
            }
            
            // 生成阳光
            if (state.frameCount % CONFIG.SUN_SPAWN_INTERVAL === 0) {
                spawnSun();
            }
            
            // 更新游戏对象
            updatePlants();
            updateNaughties();
            updateProjectiles();
            updateSunDrops();
            
            requestAnimationFrame(gameLoop);
        }

        // 开始游戏
        function startGame() {
            if (state.gameRunning) return;
            state.gameRunning = true;
            gameLoop();
        }

        // 重置游戏
        function resetGame() {
            state.gameRunning = false;
            gameObjects.plants = [];
            gameObjects.naughties = [];
            gameObjects.projectiles = [];
            gameObjects.sunDrops = [];
            gameObjects.effects = [];
            gameObjects.rescueCars = [];
            state.sun = CONFIG.INITIAL_SUN;
            state.treehouseHealth = CONFIG.INITIAL_HEALTH;
            state.frameCount = 0;
            state.naughtiesDefeated = 0;
            sunCountEl.textContent = state.sun;
            
            drawBackground();
            drawGrid();
            drawTreehouse();
        }

        // 鼠标点击事件
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            collectSun(x, y);
            
            if (x >= CONFIG.OFFSET_X && x < CONFIG.OFFSET_X + CONFIG.COLS * CONFIG.CELL_SIZE &&
                y >= CONFIG.OFFSET_Y && y < CONFIG.OFFSET_Y + CONFIG.ROWS * CONFIG.CELL_SIZE) {
                const col = Math.floor((x - CONFIG.OFFSET_X) / CONFIG.CELL_SIZE);
                const row = Math.floor((y - CONFIG.OFFSET_Y) / CONFIG.CELL_SIZE);
                plantAt(row, col);
            }
        });

        // 初始化
        resetGame();
    </script>
</body>
</html>
